model: google/gemma-4-31b-it
viewport:
  width: 1280
  height: 1080
max_steps: 40
wait_timeout_ms: 3000
dashboard_port: 8081
batch_size: 50        # orders per batch
max_retries: 2        # auto-retry retryable failures

# Connect to your real Chrome/Brave browser.
# Start Chrome with:
#   /Applications/Google Chrome.app/Contents/MacOS/Google Chrome --remote-debugging-port=9222
# Start Brave with:
#   /Applications/Brave Browser.app/Contents/MacOS/Brave Browser --remote-debugging-port=9222
cdp_endpoint: "http://localhost:9222"

# Seller note written on every order
seller_note: ""

# VAT invoice details (leave all fields empty to skip invoice step)
invoice:
  company_name: ""
  tax_id: ""
  address: ""
  email: ""
