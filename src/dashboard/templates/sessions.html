<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bot-mua-hang — Sessions</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface:  { DEFAULT: '#1e293b', dark: '#0f172a', light: '#273549' },
            border:   { DEFAULT: '#334155' },
            muted:    '#94a3b8',
            heading:  '#f8fafc',
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer components {
      .badge { @apply inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold; }
      .badge-created   { @apply bg-slate-700 text-slate-400; }
      .badge-running   { @apply bg-blue-800 text-blue-200 animate-pulse; }
      .badge-completed { @apply bg-green-900 text-green-300; }
      .btn-primary { @apply px-4 py-2 rounded-lg text-sm font-semibold bg-blue-600 text-white hover:bg-blue-700 transition-colors cursor-pointer; }
      .btn-ghost { @apply px-3 py-1.5 rounded-md text-xs font-semibold border border-red-900 text-red-300 hover:bg-red-900/50 transition-colors cursor-pointer; }
      .card { @apply bg-surface border border-border rounded-xl p-5; }
    }
  </style>
</head>
<body class="bg-surface-dark text-slate-200 min-h-screen font-[system-ui,sans-serif]">

  <!-- Navbar -->
  <nav class="bg-surface border-b border-border">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 h-14 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <svg class="w-5 h-5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z"/></svg>
        <h1 class="text-heading font-bold text-lg">bot-mua-hang</h1>
      </div>
      <button class="btn-primary flex items-center gap-2" onclick="newSession()">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
        New Session
      </button>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-6 space-y-6">

    <!-- Summary stat cards -->
    <div id="stat-cards" class="grid grid-cols-1 sm:grid-cols-3 gap-4" style="display:none">
      <div class="card flex items-center gap-4">
        <div class="p-2.5 bg-blue-900/40 rounded-lg">
          <svg class="w-5 h-5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6.429 9.75 2.25 12l4.179 2.25m0-4.5 5.571 3 5.571-3m-11.142 0L2.25 7.5 12 2.25l9.75 5.25-4.179 2.25m0 0L12 12.75l-5.571-3m11.142 0L21.75 12l-4.179 2.25m0 0L12 17.25l-5.571-3m11.142 0L21.75 17.25 12 22.5l-9.75-5.25 4.179-2.25"/></svg>
        </div>
        <div>
          <p class="text-2xl font-bold text-heading" id="stat-sessions">0</p>
          <p class="text-xs text-muted">Sessions</p>
        </div>
      </div>
      <div class="card flex items-center gap-4">
        <div class="p-2.5 bg-green-900/40 rounded-lg">
          <svg class="w-5 h-5 text-green-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 1 0-7.5 0v4.5m11.356-1.993 1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 0 1-1.12-1.243l1.264-12A1.125 1.125 0 0 1 5.513 7.5h12.974c.576 0 1.059.435 1.119 1.007ZM8.625 10.5a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm7.5 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z"/></svg>
        </div>
        <div>
          <p class="text-2xl font-bold text-heading" id="stat-orders">0</p>
          <p class="text-xs text-muted">Total Orders</p>
        </div>
      </div>
      <div class="card flex items-center gap-4">
        <div class="p-2.5 bg-emerald-900/40 rounded-lg">
          <svg class="w-5 h-5 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
        </div>
        <div>
          <p class="text-2xl font-bold text-heading" id="stat-rate">—</p>
          <p class="text-xs text-muted">Success Rate</p>
        </div>
      </div>
    </div>

    <!-- Desktop table -->
    <div class="card p-0 overflow-hidden hidden md:block">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-border">
            <th class="px-4 py-3 text-left text-xs font-semibold text-muted uppercase tracking-wider">#</th>
            <th class="px-4 py-3 text-left text-xs font-semibold text-muted uppercase tracking-wider">Created</th>
            <th class="px-4 py-3 text-left text-xs font-semibold text-muted uppercase tracking-wider">Excel File</th>
            <th class="px-4 py-3 text-left text-xs font-semibold text-muted uppercase tracking-wider">Orders</th>
            <th class="px-4 py-3 text-left text-xs font-semibold text-muted uppercase tracking-wider">Results</th>
            <th class="px-4 py-3 text-left text-xs font-semibold text-muted uppercase tracking-wider">Status</th>
            <th class="px-4 py-3 text-right text-xs font-semibold text-muted uppercase tracking-wider"></th>
          </tr>
        </thead>
        <tbody id="sessions-tbody">
          <tr><td colspan="7" class="px-4 py-12 text-center text-slate-500">Loading...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Mobile card list -->
    <div id="sessions-mobile" class="space-y-3 md:hidden"></div>

  </main>

  <!-- Toast container -->
  <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

  <script>
    const tbody = document.getElementById('sessions-tbody');
    const mobileList = document.getElementById('sessions-mobile');

    function esc(s) {
      if (!s) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const colors = {
        success: 'bg-green-900/90 text-green-200 border-green-700',
        error: 'bg-red-900/90 text-red-200 border-red-700',
        info: 'bg-blue-900/90 text-blue-200 border-blue-700',
      };
      const toast = document.createElement('div');
      toast.className = `${colors[type] || colors.info} border rounded-lg px-4 py-3 text-sm font-medium shadow-lg pointer-events-auto transform translate-x-[120%] transition-transform duration-300`;
      toast.textContent = message;
      container.appendChild(toast);
      requestAnimationFrame(() => { toast.style.transform = 'translateX(0)'; });
      setTimeout(() => {
        toast.style.transform = 'translateX(120%)';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    function renderEmpty() {
      tbody.innerHTML = `<tr><td colspan="7" class="px-4 py-16 text-center">
        <svg class="mx-auto w-16 h-16 text-slate-600 mb-4" fill="none" viewBox="0 0 24 24" stroke-width="1" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 13.5h3.86a2.25 2.25 0 0 1 2.012 1.244l.256.512a2.25 2.25 0 0 0 2.013 1.244h3.218a2.25 2.25 0 0 0 2.013-1.244l.256-.512a2.25 2.25 0 0 1 2.013-1.244h3.859m-19.5.338V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18v-4.162c0-.224-.034-.447-.1-.661L19.24 5.338a2.25 2.25 0 0 0-2.15-1.588H6.911a2.25 2.25 0 0 0-2.15 1.588L2.35 13.177a2.25 2.25 0 0 0-.1.661Z"/></svg>
        <p class="text-slate-400 font-medium mb-1">No sessions yet</p>
        <p class="text-slate-500 text-sm mb-4">Click "New Session" to start your first order batch.</p>
        <button onclick="newSession()" class="btn-primary inline-flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
          New Session
        </button>
      </td></tr>`;
      mobileList.innerHTML = `<div class="card text-center py-12">
        <svg class="mx-auto w-16 h-16 text-slate-600 mb-4" fill="none" viewBox="0 0 24 24" stroke-width="1" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 13.5h3.86a2.25 2.25 0 0 1 2.012 1.244l.256.512a2.25 2.25 0 0 0 2.013 1.244h3.218a2.25 2.25 0 0 0 2.013-1.244l.256-.512a2.25 2.25 0 0 1 2.013-1.244h3.859m-19.5.338V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18v-4.162c0-.224-.034-.447-.1-.661L19.24 5.338a2.25 2.25 0 0 0-2.15-1.588H6.911a2.25 2.25 0 0 0-2.15 1.588L2.35 13.177a2.25 2.25 0 0 0-.1.661Z"/></svg>
        <p class="text-slate-400 font-medium mb-1">No sessions yet</p>
        <p class="text-slate-500 text-sm mb-4">Tap "New Session" to get started.</p>
        <button onclick="newSession()" class="btn-primary">New Session</button>
      </div>`;
    }

    function updateStats(sessions) {
      const el = document.getElementById('stat-cards');
      if (sessions.length === 0) { el.style.display = 'none'; return; }
      el.style.display = '';

      document.getElementById('stat-sessions').textContent = sessions.length;
      const totalOrders = sessions.reduce((a, s) => a + (s.total_orders || 0), 0);
      const totalSuccess = sessions.reduce((a, s) => a + (s.success_count || 0), 0);
      document.getElementById('stat-orders').textContent = totalOrders;
      document.getElementById('stat-rate').textContent = totalOrders > 0
        ? Math.round((totalSuccess / totalOrders) * 100) + '%'
        : '—';
    }

    async function loadSessions() {
      try {
        const res = await fetch('/api/sessions');
        const sessions = await res.json();
        updateStats(sessions);

        if (sessions.length === 0) {
          renderEmpty();
          return;
        }

        // Desktop rows
        tbody.innerHTML = sessions.map(s => `
          <tr class="border-t border-border hover:bg-surface-light transition-colors cursor-pointer" onclick="window.location='/sessions/${s.id}'">
            <td class="px-4 py-3 text-slate-400 font-mono text-xs">${s.id}</td>
            <td class="px-4 py-3 whitespace-nowrap text-sm">${esc(s.created_at)}</td>
            <td class="px-4 py-3 text-sm">${esc(s.excel_filename) || '<span class="text-slate-500">—</span>'}</td>
            <td class="px-4 py-3 text-sm font-medium">${s.total_orders}</td>
            <td class="px-4 py-3">
              <div class="flex items-center gap-3 text-sm">
                <span class="inline-flex items-center gap-1.5">
                  <svg class="w-3.5 h-3.5 text-green-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm3.857-9.809a.75.75 0 0 0-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 1 0-1.06 1.061l2.5 2.5a.75.75 0 0 0 1.137-.089l4-5.5Z" clip-rule="evenodd"/></svg>
                  ${s.success_count}
                </span>
                <span class="inline-flex items-center gap-1.5">
                  <svg class="w-3.5 h-3.5 text-red-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16ZM8.28 7.22a.75.75 0 0 0-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 1 0 1.06 1.06L10 11.06l1.72 1.72a.75.75 0 1 0 1.06-1.06L11.06 10l1.72-1.72a.75.75 0 0 0-1.06-1.06L10 8.94 8.28 7.22Z" clip-rule="evenodd"/></svg>
                  ${s.failed_count}
                </span>
              </div>
            </td>
            <td class="px-4 py-3"><span class="badge badge-${s.status}">${s.status}</span></td>
            <td class="px-4 py-3 text-right">
              <button class="btn-ghost inline-flex items-center gap-1.5" onclick="deleteSession(event, ${s.id})">
                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"/></svg>
                Delete
              </button>
            </td>
          </tr>
        `).join('');

        // Mobile cards
        mobileList.innerHTML = sessions.map(s => `
          <div class="card cursor-pointer active:bg-surface-light transition-colors" onclick="window.location='/sessions/${s.id}'">
            <div class="flex items-center justify-between mb-3">
              <div class="flex items-center gap-2">
                <span class="text-slate-400 font-mono text-xs">#${s.id}</span>
                <span class="badge badge-${s.status}">${s.status}</span>
              </div>
              <button class="btn-ghost text-xs" onclick="deleteSession(event, ${s.id})">
                <svg class="w-3.5 h-3.5 inline" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"/></svg>
              </button>
            </div>
            <p class="text-sm text-slate-300 mb-1">${esc(s.excel_filename) || '<span class="text-slate-500">No file</span>'}</p>
            <p class="text-xs text-muted mb-3">${esc(s.created_at)}</p>
            <div class="flex items-center gap-4 text-sm">
              <span class="text-slate-400">${s.total_orders} orders</span>
              <span class="inline-flex items-center gap-1 text-green-400">
                <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm3.857-9.809a.75.75 0 0 0-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 1 0-1.06 1.061l2.5 2.5a.75.75 0 0 0 1.137-.089l4-5.5Z" clip-rule="evenodd"/></svg>
                ${s.success_count}
              </span>
              <span class="inline-flex items-center gap-1 text-red-400">
                <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16ZM8.28 7.22a.75.75 0 0 0-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 1 0 1.06 1.06L10 11.06l1.72 1.72a.75.75 0 1 0 1.06-1.06L11.06 10l1.72-1.72a.75.75 0 0 0-1.06-1.06L10 8.94 8.28 7.22Z" clip-rule="evenodd"/></svg>
                ${s.failed_count}
              </span>
            </div>
          </div>
        `).join('');

      } catch {
        tbody.innerHTML = '<tr><td colspan="7" class="px-4 py-12 text-center text-red-400">Failed to load sessions.</td></tr>';
        mobileList.innerHTML = '<div class="card text-center py-8 text-red-400">Failed to load sessions.</div>';
      }
    }

    async function newSession() {
      const res = await fetch('/api/sessions', { method: 'POST' });
      const data = await res.json();
      window.location = '/sessions/' + data.id;
    }

    async function deleteSession(e, id) {
      e.stopPropagation();
      if (!confirm('Delete session #' + id + ' and all its data?')) return;
      await fetch('/api/sessions/' + id, { method: 'DELETE' });
      showToast('Session #' + id + ' deleted', 'success');
      loadSessions();
    }

    loadSessions();
    setInterval(loadSessions, 5000);
  </script>
</body>
</html>
