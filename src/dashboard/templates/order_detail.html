<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bot-mua-hang — Order Detail</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface:  { DEFAULT: '#1e293b', dark: '#0f172a', light: '#273549' },
            border:   { DEFAULT: '#334155' },
            muted:    '#94a3b8',
            heading:  '#f8fafc',
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer components {
      .badge { @apply inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold; }
      .badge-pending  { @apply bg-slate-700 text-slate-400; }
      .badge-running  { @apply bg-blue-800 text-blue-200 animate-pulse; }
      .badge-success  { @apply bg-green-900 text-green-300; }
      .badge-failed   { @apply bg-red-900 text-red-300; }
      .card { @apply bg-surface border border-border rounded-xl; }
    }
  </style>
</head>
<body class="bg-surface-dark text-slate-200 min-h-screen font-[system-ui,sans-serif]">

  <!-- Navbar -->
  <nav class="bg-surface border-b border-border">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 h-14 flex items-center gap-3">
      <svg class="w-5 h-5 text-blue-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z"/></svg>
      <a href="/" class="text-heading font-bold text-lg hover:text-blue-400 transition-colors">bot-mua-hang</a>
      <!-- Breadcrumb -->
      <div id="breadcrumb" class="text-sm text-muted flex items-center gap-1.5 ml-2">
        <span class="text-slate-600">Loading...</span>
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-6 space-y-6">

    <!-- Order info card -->
    <div class="card p-5 sm:p-6" id="order-card">
      <h2 class="text-lg font-bold text-heading mb-4 flex items-center gap-3 flex-wrap" id="order-title">
        Loading...
      </h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-x-8 gap-y-3 text-sm" id="order-meta"></div>
      <div id="order-note"></div>
    </div>

    <!-- Steps title -->
    <div class="flex items-center gap-3" id="steps-title-wrap">
      <h3 class="text-base font-bold text-heading" id="steps-title"></h3>
    </div>

    <!-- Steps timeline -->
    <div id="steps-container" class="relative">
      <div class="text-center py-12 text-slate-500">Loading steps...</div>
    </div>

  </main>

  <!-- Fullscreen image modal -->
  <div id="img-modal" class="fixed inset-0 bg-black/85 z-[200] hidden items-center justify-center cursor-zoom-out" onclick="closeImgModal(event)">
    <button onclick="closeImgModal()" class="absolute top-4 right-4 text-white/60 hover:text-white transition-colors z-10">
      <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg>
    </button>
    <img id="img-modal-img" src="" class="max-w-[95vw] max-h-[95vh] object-contain rounded-lg" />
  </div>

  <script>
    const orderDbId = parseInt(location.pathname.split('/').pop()) || 0;

    function esc(s) {
      if (!s) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function showFull(src) {
      const modal = document.getElementById('img-modal');
      document.getElementById('img-modal-img').src = src;
      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }

    function closeImgModal(evt) {
      if (evt && evt.target.tagName === 'IMG') return;
      const modal = document.getElementById('img-modal');
      modal.classList.remove('flex');
      modal.classList.add('hidden');
    }

    // SVG icon map for meta fields
    const metaIcons = {
      'URL': '<svg class="w-4 h-4 text-blue-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688a4.5 4.5 0 0 1 1.242 7.244l-4.5 4.5a4.5 4.5 0 0 1-6.364-6.364l1.757-1.757m13.35-.622 1.757-1.757a4.5 4.5 0 0 0-6.364-6.364l-4.5 4.5a4.5 4.5 0 0 0 1.242 7.244"/></svg>',
      'Product ID': '<svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M5.25 8.25h15m-16.5 7.5h15m-1.8-13.5-3.9 19.5m-2.1-19.5-3.9 19.5"/></svg>',
      'Receiver': '<svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/></svg>',
      'Phone': '<svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 0 0 2.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 0 1-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 0 0-1.091-.852H4.5A2.25 2.25 0 0 0 2.25 4.5v2.25Z"/></svg>',
      'Address': '<svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"/></svg>',
      'Quantity': '<svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 7.5l-.625 10.632a2.25 2.25 0 0 1-2.247 2.118H6.622a2.25 2.25 0 0 1-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125Z"/></svg>',
      'Shopee Order ID': '<svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 0 0 2.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 0 0-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75 2.25 2.25 0 0 0-.1-.664m-5.8 0A2.251 2.251 0 0 1 13.5 2.25H15a2.25 2.25 0 0 1 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25ZM6.75 12h.008v.008H6.75V12Zm0 3h.008v.008H6.75V15Zm0 3h.008v.008H6.75V18Z"/></svg>',
      'Retry Count': '<svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182"/></svg>',
      'Total Steps': '<svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 12h16.5m-16.5 3.75h16.5M3.75 19.5h16.5M5.625 4.5h12.75a1.875 1.875 0 0 1 0 3.75H5.625a1.875 1.875 0 0 1 0-3.75Z"/></svg>',
      'Started': '<svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>',
      'Completed': '<svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>',
    };

    async function loadOrder() {
      try {
        const res = await fetch(`/api/orders/${orderDbId}`);
        if (!res.ok) {
          document.getElementById('order-title').textContent = 'Order not found';
          return;
        }
        const order = await res.json();
        renderOrder(order);
      } catch {
        document.getElementById('order-title').textContent = 'Failed to load order';
      }
    }

    function renderOrder(order) {
      const sessionId = order.session_id;

      // Breadcrumb
      document.getElementById('breadcrumb').innerHTML = `
        <svg class="w-4 h-4 text-slate-600" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5"/></svg>
        <a href="/" class="hover:text-blue-400 transition-colors">Sessions</a>
        <svg class="w-4 h-4 text-slate-600" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5"/></svg>
        <a href="/sessions/${sessionId}" class="hover:text-blue-400 transition-colors">Session #${sessionId}</a>
        <svg class="w-4 h-4 text-slate-600" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5"/></svg>
        <span class="text-slate-300">Order #${order.id}</span>
      `;

      // Title
      const statusClass = `badge-${order.status}`;
      document.getElementById('order-title').innerHTML =
        `${esc(order.product_name) || 'Order #' + order.id} <span class="badge ${statusClass}">${order.status}</span>`;

      // Meta grid with icons
      const meta = document.getElementById('order-meta');
      const fields = [
        ['URL', order.product_url ? `<a href="${esc(order.product_url)}" target="_blank" class="text-blue-400 hover:underline truncate">${esc(order.product_url)}</a>` : '—'],
        ['Product ID', esc(order.product_id) || '—'],
        ['Receiver', esc(order.receiver_name) || '—'],
        ['Phone', esc(order.phone_number) || '—'],
        ['Address', esc(order.address) || '—'],
        ['Quantity', order.quantity || '—'],
        ['Shopee Order ID', esc(order.order_id) || '—'],
        ['Retry Count', order.retry_count || '0'],
        ['Total Steps', order.total_steps || '0'],
        ['Started', esc(order.started_at) || '—'],
        ['Completed', esc(order.completed_at) || '—'],
      ];
      meta.innerHTML = fields.map(([label, value]) =>
        `<div class="flex items-center gap-2.5">
          ${metaIcons[label] || ''}
          <span class="text-muted font-medium whitespace-nowrap">${label}:</span>
          <span class="text-slate-200 truncate min-w-0">${value}</span>
        </div>`
      ).join('');

      // Note
      const noteDiv = document.getElementById('order-note');
      if (order.note) {
        noteDiv.innerHTML = `<div class="mt-4 px-3 py-2.5 bg-surface-dark rounded-lg text-sm text-red-300 border-l-[3px] border-red-500">${esc(order.note)}</div>`;
      }

      // Steps
      const steps = order.steps || [];
      document.getElementById('steps-title').textContent = `Steps (${steps.length})`;
      const container = document.getElementById('steps-container');

      if (steps.length === 0) {
        container.innerHTML = `<div class="text-center py-16">
          <svg class="mx-auto w-16 h-16 text-slate-600 mb-4" fill="none" viewBox="0 0 24 24" stroke-width="1" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 12h16.5m-16.5 3.75h16.5M3.75 19.5h16.5M5.625 4.5h12.75a1.875 1.875 0 0 1 0 3.75H5.625a1.875 1.875 0 0 1 0-3.75Z"/></svg>
          <p class="text-slate-400 font-medium">No steps recorded</p>
          <p class="text-slate-500 text-sm mt-1">Steps will appear here once processing begins.</p>
        </div>`;
        return;
      }

      const debugDir = order.debug_log_dir || '';

      container.innerHTML = `<div class="relative">
        <!-- Timeline line -->
        <div class="absolute left-[18px] top-0 bottom-0 w-0.5 bg-border hidden sm:block"></div>

        ${steps.map(s => {
          const isDone = s.action === 'done';
          const isFail = s.action === 'fail';
          const circleColor = isDone ? 'bg-green-600 text-white' : isFail ? 'bg-red-600 text-white' : 'bg-blue-600 text-white';
          const actionTagClass = isDone ? 'bg-green-900/60 text-green-300' : isFail ? 'bg-red-900/60 text-red-300' : 'bg-slate-700 text-slate-200';

          const details = [];
          if (s.element_index) details.push(`element: ${s.element_index}`);
          if (s.target_x || s.target_y) details.push(`coords: (${s.target_x}, ${s.target_y})`);
          if (s.text_to_type) details.push(`text: "${esc(s.text_to_type)}"`);
          if (s.scroll_direction) details.push(`scroll: ${s.scroll_direction}`);

          const screenshotSrc = (debugDir && s.screenshot_filename) ? `/${debugDir}/${s.screenshot_filename}` : '';
          const annotatedSrc = (debugDir && s.annotated_filename) ? `/${debugDir}/${s.annotated_filename}` : '';

          return `<div class="relative flex gap-4 pb-6 sm:pl-0">
            <!-- Timeline circle -->
            <div class="relative z-10 shrink-0 hidden sm:flex">
              <span class="${circleColor} rounded-full w-9 h-9 flex items-center justify-center text-xs font-bold shadow-md">${s.step_number}</span>
            </div>

            <!-- Card -->
            <div class="card p-4 sm:p-5 flex-1 min-w-0">
              <div class="flex items-center gap-3 mb-3 flex-wrap">
                <span class="${circleColor} rounded-full w-7 h-7 flex items-center justify-center text-xs font-bold sm:hidden">${s.step_number}</span>
                <span class="text-xs text-muted">${esc(s.timestamp)}</span>
                <span class="text-xs text-slate-600 truncate max-w-[400px]"><a href="${esc(s.url)}" target="_blank" class="hover:text-blue-400 transition-colors">${esc(s.url)}</a></span>
              </div>
              <div class="flex flex-wrap gap-2 mb-3">
                <span class="${actionTagClass} px-2.5 py-0.5 rounded text-xs font-semibold">${esc(s.action)}</span>
                ${details.length ? `<span class="text-xs text-muted">${details.join(' | ')}</span>` : ''}
              </div>
              ${s.reasoning ? `<div class="mt-2 px-3 py-2.5 bg-surface-dark rounded-lg text-sm text-muted leading-relaxed"><strong class="text-slate-200">Reasoning:</strong> ${esc(s.reasoning)}</div>` : ''}
              ${s.observation ? `<div class="mt-2 px-3 py-2.5 bg-[#0b1120] rounded-lg text-xs text-slate-500 leading-relaxed"><strong class="text-slate-400">Observation:</strong> ${esc(s.observation)}</div>` : ''}
              <div class="flex gap-4 mt-3 flex-wrap">
                ${screenshotSrc ? `<figure class="flex-1 min-w-[250px] max-w-[50%]"><figcaption class="text-[10px] text-muted uppercase tracking-wider mb-1.5">Screenshot</figcaption><img src="${screenshotSrc}" alt="Step ${s.step_number}" loading="lazy" onclick="showFull(this.src)" class="w-full rounded-lg border border-border cursor-pointer hover:border-blue-500 transition-colors" /></figure>` : ''}
                ${annotatedSrc ? `<figure class="flex-1 min-w-[250px] max-w-[50%]"><figcaption class="text-[10px] text-muted uppercase tracking-wider mb-1.5">Annotated</figcaption><img src="${annotatedSrc}" alt="Step ${s.step_number} annotated" loading="lazy" onclick="showFull(this.src)" class="w-full rounded-lg border border-border cursor-pointer hover:border-blue-500 transition-colors" /></figure>` : ''}
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>`;
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeImgModal();
    });

    loadOrder();
  </script>
</body>
</html>
